<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>收货地址 - 校园点餐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            padding-bottom: 30px;
        }
        .header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
        }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: #333; }
        .header h1 { font-size: 18px; flex: 1; }

        .form-container {
            padding: 20px 15px;
        }
        .form-group {
            background: white;
            border-radius: 16px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .form-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        .form-item:last-child { border-bottom: none; }
        .form-label { width: 80px; font-size: 15px; color: #333; font-weight: 500; }
        .form-input {
            flex: 1;
            border: none;
            padding: 8px 0;
            font-size: 15px;
            outline: none;
            background: transparent;
        }
        .form-input::placeholder { color: #ccc; }
        .save-btn, .add-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .address-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .address-info { flex: 1; }
        .address-name { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .address-detail { font-size: 13px; color: #666; margin-bottom: 5px; }
        .address-phone { font-size: 12px; color: #999; }
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .default-badge {
            background: #e8f5e9;
            color: #4caf50;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
        .empty { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>
<div class="header">
    <a href="student_profile.html" class="back-btn">←</a>
    <h1>收货地址</h1>
</div>

<div id="addressList"></div>
<div class="form-container" id="addForm" style="display: none;">
    <div class="form-group">
        <div class="form-item">
            <span class="form-label">收货人</span>
            <input type="text" class="form-input" id="addressName" placeholder="请输入姓名">
        </div>
        <div class="form-item">
            <span class="form-label">手机号</span>
            <input type="tel" class="form-input" id="addressPhone" placeholder="请输入手机号">
        </div>
        <div class="form-item">
            <span class="form-label">详细地址</span>
            <input type="text" class="form-input" id="addressDetail" placeholder="请输入详细地址">
        </div>
    </div>
    <button class="save-btn" onclick="saveAddress()">保存地址</button>
    <button class="add-btn" onclick="cancelAdd()" style="background:#999">取消</button>
</div>
<button class="add-btn" id="showAddBtn" onclick="showAddForm()">+ 新增地址</button>

<script>
    let addresses = [];

    function loadAddresses() {
        const saved = localStorage.getItem('studentAddresses');
        if (saved) {
            addresses = JSON.parse(saved);
        } else {
            // 默认地址
            addresses = [{
                id: 1,
                name: '小明',
                phone: '13812345678',
                address: '学生食堂1楼取餐窗口',
                isDefault: true
            }];
            localStorage.setItem('studentAddresses', JSON.stringify(addresses));
        }
        renderAddresses();
    }

    function renderAddresses() {
        if (!addresses.length) {
            document.getElementById('addressList').innerHTML = '<div class="empty">暂无收货地址<br>点击下方按钮添加</div>';
            return;
        }
        const html = addresses.map(addr => `
            <div class="address-card">
                <div class="address-info">
                    <div class="address-name">
                        ${addr.name}
                        ${addr.isDefault ? '<span class="default-badge">默认</span>' : ''}
                    </div>
                    <div class="address-detail">${addr.address}</div>
                    <div class="address-phone">${addr.phone}</div>
                </div>
                <button class="delete-btn" onclick="deleteAddress(${addr.id})">删除</button>
            </div>
        `).join('');
        document.getElementById('addressList').innerHTML = html;
    }

    function showAddForm() {
        document.getElementById('addForm').style.display = 'block';
        document.getElementById('showAddBtn').style.display = 'none';
        document.getElementById('addressList').style.display = 'none';
        document.getElementById('addressName').value = '';
        document.getElementById('addressPhone').value = '';
        document.getElementById('addressDetail').value = '';
    }

    function cancelAdd() {
        document.getElementById('addForm').style.display = 'none';
        document.getElementById('showAddBtn').style.display = 'block';
        document.getElementById('addressList').style.display = 'block';
    }

    function saveAddress() {
        const name = document.getElementById('addressName').value.trim();
        const phone = document.getElementById('addressPhone').value.trim();
        const address = document.getElementById('addressDetail').value.trim();

        if (!name) { alert('请输入收货人姓名'); return; }
        if (!phone) { alert('请输入手机号'); return; }
        if (!address) { alert('请输入详细地址'); return; }

        const newId = Date.now();
        const newAddress = {
            id: newId,
            name: name,
            phone: phone,
            address: address,
            isDefault: addresses.length === 0
        };
        addresses.push(newAddress);
        localStorage.setItem('studentAddresses', JSON.stringify(addresses));
        cancelAdd();
        renderAddresses();
        alert('添加成功');
    }

    function deleteAddress(id) {
        if (!confirm('确认删除该地址吗？')) return;
        addresses = addresses.filter(addr => addr.id !== id);
        if (addresses.length > 0 && !addresses.some(a => a.isDefault)) {
            addresses[0].isDefault = true;
        }
        localStorage.setItem('studentAddresses', JSON.stringify(addresses));
        renderAddresses();
    }

    loadAddresses();
</script>
</body>
</html>
