<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>联系商家 - 校园点餐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
        }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: #333; }
        .header h1 { font-size: 18px; flex: 1; }
        .merchant-name { font-size: 14px; color: #667eea; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
        }
        .message-sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-received {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .message-time {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
            text-align: right;
        }
        .message-received .message-time {
            color: #999;
            text-align: left;
        }
        .input-area {
            background: white;
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
        }
        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="header">
    <a href="javascript:history.back()" class="back-btn">←</a>
    <div>
        <h1>联系商家</h1>
        <div class="merchant-name" id="merchantName">加载中...</div>
    </div>
</div>
<div class="chat-container" id="chatContainer">
    <div class="empty-chat">加载聊天记录...</div>
</div>
<div class="input-area">
    <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
    <button onclick="sendMessage()">发送</button>
</div>

<script>
    const token = localStorage.getItem('studentToken');
    if (!token) window.location.href = 'student_login.html';

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');

    if (!orderId) {
        window.location.href = 'student_orders.html';
    }

    let merchantId = null;
    let merchantName = '';

    // 加载订单信息获取商家ID
    async function loadOrderInfo() {
        try {
            const res = await fetch(`/api/student/orders/${orderId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (data.code === 200) {
                merchantId = data.data.merchantId;
                merchantName = '商家';
                document.getElementById('merchantName').innerText = merchantName;
                loadMessages();
            }
        } catch (err) {
            document.getElementById('merchantName').innerText = '加载失败';
        }
    }

    // 加载聊天记录
    async function loadMessages() {
        try {
            const res = await fetch(`/api/student/messages/${orderId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (data.code === 200 && data.data) {
                renderMessages(data.data);
            } else {
                document.getElementById('chatContainer').innerHTML = '<div class="empty-chat">暂无聊天记录<br>有什么问题可以咨询商家~</div>';
            }
        } catch (err) {
            document.getElementById('chatContainer').innerHTML = '<div class="empty-chat">加载失败</div>';
        }
    }

    function renderMessages(messages) {
        if (!messages || messages.length === 0) {
            document.getElementById('chatContainer').innerHTML = '<div class="empty-chat">暂无聊天记录<br>有什么问题可以咨询商家~</div>';
            return;
        }
        const html = messages.map(msg => {
            const isSent = msg.senderType === 'user';
            return `
                <div class="message ${isSent ? 'message-sent' : 'message-received'}">
                    ${msg.content}
                    <div class="message-time">${formatTime(msg.createdAt)}</div>
                </div>
            `;
        }).join('');
        document.getElementById('chatContainer').innerHTML = html;
        // 滚动到底部
        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content) return;

        input.value = '';

        try {
            const res = await fetch('/api/student/messages/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({
                    orderId: parseInt(orderId),
                    merchantId: merchantId,
                    content: content
                })
            });
            const data = await res.json();
            if (data.code === 200) {
                loadMessages();
            } else {
                alert('发送失败：' + data.message);
                input.value = content;
            }
        } catch (err) {
            alert('网络错误');
            input.value = content;
        }
    }

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const date = new Date(timeStr);
        return `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }

    // 定时刷新消息
    let interval = setInterval(() => {
        if (orderId) loadMessages();
    }, 5000);

    window.onbeforeunload = () => {
        if (interval) clearInterval(interval);
    };

    loadOrderInfo();
</script>
</body>
</html>
