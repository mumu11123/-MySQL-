<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>校园点餐 - 学生登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; font-size: 48px; margin-bottom: 20px; }
        h1 { text-align: center; font-size: 24px; color: #333; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:active { transform: scale(0.98); }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .register-link a { color: #667eea; text-decoration: none; font-weight: bold; }
        .error-msg { color: #ff4757; font-size: 14px; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">🍜</div>
    <h1>校园自助点餐</h1>
    <div class="input-group">
        <input type="text" id="username" placeholder="用户名" autocomplete="off">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="密码">
    </div>
    <button class="login-btn" onclick="login()">登 录</button>
    <div class="register-link">
        还没有账号？ <a href="student_register.html">立即注册</a>
    </div>
    <div class="error-msg" id="errorMsg"></div>
</div>

<script>
    if (localStorage.getItem('studentToken')) {
        window.location.href = 'student_home.html';
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');

        if (!username || !password) {
            errorMsg.innerText = '请输入用户名和密码';
            return;
        }

        try {
            const res = await fetch('/api/auth/login/student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.code === 200) {
                localStorage.setItem('studentToken', data.data);
                localStorage.setItem('studentUsername', username);
                window.location.href = 'student_home.html';
            } else {
                errorMsg.innerText = data.message || '登录失败';
            }
        } catch (err) {
            errorMsg.innerText = '网络错误，请稍后重试';
        }
    }
</script>
</body>
</html>
